services:
  fastship:
    build: .
    env_file:
      - .env
    environment:
      POSTGRES_SERVER: db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    expose:
      - 8000
    command: ["fastapi", "run", "--port", "8000"]
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - celery

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "47hpwg.postgres"
      POSTGRES_DB: "fastship"
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    command: redis-server --appendonly yes
    volumes:
      - ./redis_data:/data

  celery:
    build: .
    env_file:
      - .env
    environment:
      POSTGRES_SERVER: db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["celery", "-A", "app.worker.tasks", "worker", "--loglevel=info"]
    depends_on:
      - redis
      - db
